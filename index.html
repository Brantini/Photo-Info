<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gallery Curator</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Playfair+Display:ital,wght@1,900&family=JetBrains+Mono:wght@700&family=Dancing+Script:wght@700&family=Montserrat:wght@900&family=Poppins:wght@800&family=Libre+Baskerville:ital@1&family=Cinzel:wght@900&family=Abril+Fatface&family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@1,700&family=Fira+Code:wght@500&family=Kaushan+Script&family=Oswald:wght@700&family=Pacifico&family=Anton&family=Megrim&family=Special+Elite&family=Rye&family=UnifrakturMaguntia&family=Monoton&family=Staatliches&family=Syncopate:wght@700&family=Syne:wght@800&family=Vampiro+One&family=Alumni+Sans+Inline+One&family=Bungee+Shade&family=Creepster&family=Great+Vibes&family=Homemade+Apple&family=Inconsolata:wght@700&family=Kanit:wght@900&family=Lobster&family=Michroma&family=Nabaster&family=Orbitron:wght@900&family=Permanent+Marker&family=Press+Start+2P&family=Righteous&family=Rock+Salt&family=Satisfy&family=Sixtyfour&family=Teko:wght@700&family=Tourney:wght@900&family=VT323&family=Wallpoet&family=Zilla+Slab+Highlight:wght@700&family=Bungee+Inline&family=Codystar&family=Faster+One&family=Fredericka+the+Great&family=Kelly+Slab&family=Kumar+One+Outline&family=Londrina+Shadow&family=Megrim&family=Metal+Mania&family=Nosifer&family=Rubik+Iso&family=Shojumaru&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --font-l: 'Inter'; --font-c: 'Playfair Display'; --font-r: 'JetBrains Mono'; }
        body { background-color: #080808; color: #eee; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        .app-container { display: flex; flex-direction: column; min-height: 100vh; }
        @media (min-width: 1024px) { .app-container { flex-direction: row; } }
        
        .sidebar-bg { background-color: #0f0f0f; border-top: 1px solid #222; }
        @media (min-width: 1024px) { .sidebar-bg { width: 340px; border-top: none; border-left: 1px solid #222; } }
        
        .custom-input { background-color: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 6px; width: 100%; font-size: 14px; }
        .custom-select { background-color: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 6px; width: 100%; font-size: 14px; cursor: pointer; -webkit-appearance: none; }
        
        .viewport-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; padding: 15px; overflow: hidden; }
        #art-canvas { display: none; background: #ffffff; flex-direction: column; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: all 0.2s ease; max-width: 100%; }
        #p-img { max-width: 100%; max-height: 60vh; object-fit: contain; }
        @media (min-width: 1024px) { #p-img { max-height: 75vh; } }

        /* 应用变量 */
        #out-model { font-family: var(--font-l), sans-serif !important; }
        #out-logo { font-family: var(--font-c), serif !important; }
        #out-params, #out-date { font-family: var(--font-r), monospace !important; }

        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: #333; }
        optgroup { color: #3b82f6; font-style: normal; font-weight: bold; background: #000; }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number], input[type=range] { -moz-appearance: textfield; }
        
        #f-bar { padding: 20px !important; }

        /* 滑块样式 */
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #3b82f6; cursor: pointer; margin-top: -6px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #333; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="app-container">
        <main class="viewport-container">
            <div id="art-canvas">
                <img id="p-img" src="">
                <div id="f-bar" class="w-full flex justify-between items-end">
                    <div class="flex-1 flex flex-col">
                        <div id="out-model" class="font-black tracking-tighter leading-none">---</div>
                    </div>
                    <div class="flex-1 flex justify-center">
                        <div id="out-logo" class="px-2 uppercase">---</div>
                    </div>
                    <div class="flex-1 flex flex-col items-end text-right">
                        <div id="out-params" class="font-bold tracking-tight uppercase">---</div>
                        <div id="out-date" class="opacity-70 mt-1 font-mono">---</div>
                    </div>
                </div>
            </div>
        </main>

        <aside class="sidebar-bg p-4 space-y-4 sidebar overflow-y-auto h-screen lg:h-auto">
            <button id="upload-btn" class="w-full bg-blue-600 text-white font-bold py-4 rounded text-xs uppercase tracking-widest hover:bg-blue-500 transition-all shadow-lg active:scale-95">导入照片</button>
            <input type="file" id="file-in" class="hidden" accept="image/*">

            <script type="text/template" id="font-options">
                <optgroup label="—— 极简无衬线 ——">
                    <option value="Inter" style="font-family: 'Inter', sans-serif;">Inter (默认)</option>
                    <option value="Montserrat" style="font-family: 'Montserrat', sans-serif;">Montserrat</option>
                    <option value="Syncopate" style="font-family: 'Syncopate', sans-serif;">Syncopate</option>
                    <option value="Poppins" style="font-family: 'Poppins', sans-serif;">Poppins</option>
                </optgroup>
                <optgroup label="—— 经典与奢侈 ——">
                    <option value="Playfair Display" style="font-family: 'Playfair Display', serif;">Playfair (杂志)</option>
                    <option value="Cinzel" style="font-family: 'Cinzel', serif;">Cinzel (石刻)</option>
                    <option value="Cormorant Garamond" style="font-family: 'Cormorant Garamond', serif;">Garamond</option>
                    <option value="Great Vibes" style="font-family: 'Great Vibes', cursive;">Great Vibes</option>
                </optgroup>
                <optgroup label="—— 潮流与海报 ——">
                    <option value="Bebas Neue" style="font-family: 'Bebas Neue', sans-serif;">Bebas Neue</option>
                    <option value="Anton" style="font-family: 'Anton', sans-serif;">Anton</option>
                    <option value="Righteous" style="font-family: 'Righteous', sans-serif;">Righteous</option>
                </optgroup>
                <optgroup label="—— 艺术与复古 ——">
                    <option value="Special Elite" style="font-family: 'Special Elite', cursive;">Typewriter</option>
                    <option value="Sixtyfour" style="font-family: 'Sixtyfour', sans-serif;">Digital 64</option>
                </optgroup>
                <optgroup label="—— 极客与工业 ——">
                    <option value="JetBrains Mono" style="font-family: 'JetBrains Mono', monospace;">JetBrains Mono</option>
                    <option value="Orbitron" style="font-family: 'Orbitron', sans-serif;">Orbitron</option>
                </optgroup>
            </script>

            <div class="bg-white/5 p-3 rounded-lg border border-white/5 space-y-2">
                <label class="text-[9px] text-gray-400 uppercase block">📐 精确留白 (px)</label>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <input type="number" id="pad-t" value="50" class="custom-input !py-2" placeholder="上">
                    <input type="number" id="pad-b" value="50" class="custom-input !py-2" placeholder="下">
                    <input type="number" id="pad-l" value="50" class="custom-input !py-2" placeholder="左">
                    <input type="number" id="pad-r" value="50" class="custom-input !py-2" placeholder="右">
                </div>
            </div>

            <div class="space-y-3">
                <div class="bg-white/5 p-2 rounded-lg border border-white/5 space-y-1">
                    <input type="text" id="i-model" class="custom-input !py-2" placeholder="相机型号">
                    <select id="s-font-left" class="custom-select !py-2 font-dropdown"></select>
                    <label class="text-[9px] text-gray-400 block pt-1">大小: <input type="range" id="size-model" min="12" max="60" value="20"></label>
                </div>
                
                <div class="bg-white/5 p-2 rounded-lg border border-white/5 space-y-1">
                    <input type="text" id="i-logo" class="custom-input !py-2" placeholder="品牌标识">
                    <select id="s-font-center" class="custom-select !py-2 font-dropdown"></select>
                    <label class="text-[9px] text-gray-400 block pt-1">大小: <input type="range" id="size-logo" min="12" max="60" value="30"></label>
                </div>
                
                <div class="bg-white/5 p-2 rounded-lg border border-white/5 space-y-1">
                    <input type="text" id="i-params" class="custom-input !py-2" placeholder="参数">
                    <input type="text" id="i-date" class="custom-input !py-2" placeholder="日期">
                    <select id="s-font-right" class="custom-select !py-2 font-dropdown"></select>
                    <label class="text-[9px] text-gray-400 block pt-1">大小: <input type="range" id="size-params" min="8" max="30" value="16"></label>
                </div>
            </div>

            <div class="flex gap-2">
                <div class="flex-1 text-center text-[9px] text-gray-400">底色<input type="color" id="c-bg" value="#ffffff" class="w-full h-8 cursor-pointer rounded mt-1"></div>
                <div class="flex-1 text-center text-[9px] text-gray-400">文字<input type="color" id="c-txt" value="#1a1a1a" class="w-full h-8 cursor-pointer rounded mt-1"></div>
            </div>

            <button id="save-btn" class="hidden w-full bg-white text-black font-bold py-4 rounded text-xs uppercase tracking-widest hover:bg-gray-200 transition-all shadow-xl">专业导出</button>
        </aside>
    </div>

    <script>
    $(document).ready(function() {
        $('.font-dropdown').html($('#font-options').html());
        $('#s-font-left').val('Inter');
        $('#s-font-center').val('Playfair Display');
        $('#s-font-right').val('JetBrains Mono');

        function updatePreview() {
            const root = document.documentElement;
            root.style.setProperty('--font-l', $('#s-font-left').val());
            root.style.setProperty('--font-c', $('#s-font-center').val());
            root.style.setProperty('--font-r', $('#s-font-right').val());

            const txtColor = $('#c-txt').val();
            const bgColor = $('#c-bg').val();
            
            // 应用留白
            $('#art-canvas').css({
                'padding-top': ($('#pad-t').val() || 50) + "px",
                'padding-bottom': ($('#pad-b').val() || 50) + "px",
                'padding-left': ($('#pad-l').val() || 50) + "px",
                'padding-right': ($('#pad-r').val() || 50) + "px",
                'background-color': bgColor
            });

            // 应用大小控制
            $('#out-model').css('font-size', $('#size-model').val() + "px");
            $('#out-logo').css('font-size', $('#size-logo').val() + "px");
            $('#out-params').css('font-size', $('#size-params').val() + "px");
            $('#out-date').css('font-size', (parseInt($('#size-params').val()) * 0.7) + "px");

            // 文字色彩与透明度
            const isDark = (parseInt(bgColor.substring(1), 16) < 0xffffff / 2);
            const textOpacity = isDark ? 0.9 : 1;
            $('#f-bar').css({ 'color': txtColor, 'opacity': textOpacity });
            
            $('#out-model').text($('#i-model').val() || "CAMERA");
            $('#out-params').text($('#i-params').val() || "PARAMS");
            $('#out-date').text($('#i-date').val() || "DATE");
            $('#out-logo').text($('#i-logo').val() || "BRAND");
        }

        $('input, select').on('input change', updatePreview);
        $('#upload-btn').click(() => $('#file-in').click());

        $('#file-in').on('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                $('#p-img').attr('src', ev.target.result).on('load', function() {
                    $('#art-canvas').css('display', 'flex');
                    $('#save-btn').removeClass('hidden');

                    EXIF.getData(file, function() {
                        const t = EXIF.getAllTags(this);
                        const model = t.Model || t.Make || "UNKNOWN";
                        $('#i-model').val(model.toUpperCase());
                        
                        const f = t.FNumber ? "f/" + t.FNumber.toFixed(1) : "";
                        const focal = t.FocalLength ? t.FocalLength.valueOf() + "mm" : "";
                        const shutter = t.ExposureTime ? (t.ExposureTime < 1 ? `1/${Math.round(1/t.ExposureTime)}s` : `${t.ExposureTime}s`) : "";
                        const iso = t.ISOSpeedRatings ? "ISO " + t.ISOSpeedRatings : "";
                        
                        $('#i-params').val(`${focal} ${f} ${shutter} ${iso}`.trim());
                        $('#i-logo').val((t.Make || "STUDIO").split(' ')[0].toUpperCase());
                        $('#i-date').val(t.DateTime?.split(' ')[0].replace(/:/g, '.') || "");
                        updatePreview();
                    });
                });
            };
            reader.readAsDataURL(file);
        });

        $('#save-btn').click(function() {
            html2canvas($('#art-canvas')[0], { scale: 3, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.href = canvas.toDataURL("image/png");
                link.download = `Precision_Gallery_${Date.now()}.png`;
                link.click();
            });
        });
    });
    </script>
</body>
</html>
