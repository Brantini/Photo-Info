<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片边框水印</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Playfair+Display:ital,wght@1,900&family=JetBrains+Mono:wght@700&family=Dancing+Script:wght@700&family=Montserrat:wght@900&family=Poppins:wght@800&family=Libre+Baskerville:ital@1&family=Cinzel:wght@900&family=Abril+Fatface&family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@1,700&family=Fira+Code:wght@500&family=Kaushan+Script&family=Oswald:wght@700&family=Pacifico&family=Anton&family=Megrim&family=Special+Elite&family=Rye&family=UnifrakturMaguntia&family=Monoton&family=Staatliches&family=Syncopate:wght@700&family=Syne:wght@800&family=Vampiro+One&family=Alumni+Sans+Inline+One&family=Bungee+Shade&family=Creepster&family=Great+Vibes&family=Homemade+Apple&family=Inconsolata:wght@700&family=Kanit:wght@900&family=Lobster&family=Michroma&family=Nabaster&family=Orbitron:wght@900&family=Permanent+Marker&family=Press+Start+2P&family=Righteous&family=Rock+Salt&family=Satisfy&family=Sixtyfour&family=Teko:wght@700&family=Tourney:wght@900&family=VT323&family=Wallpoet&family=Zilla+Slab+Highlight:wght@700&family=Bungee+Inline&family=Codystar&family=Faster+One&family=Fredericka+the+Great&family=Kelly+Slab&family=Kumar+One+Outline&family=Londrina+Shadow&family=Megrim&family=Metal+Mania&family=Nosifer&family=Rubik+Iso&family=Shojumaru&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --font-l: 'Inter'; --font-c: 'Playfair Display'; --font-r: 'JetBrains Mono'; }
        body { background-color: #080808; color: #eee; font-family: 'Inter', sans-serif; overflow: hidden; }
        .sidebar-bg { background-color: #0f0f0f; border-right: 1px solid #222; }
        .custom-input { background-color: #1a1a1a; border: 1px solid #333; color: white; padding: 10px; border-radius: 6px; width: 100%; font-size: 12px; }
        .custom-select { background-color: #1a1a1a; border: 1px solid #333; color: white; padding: 10px; border-radius: 6px; width: 100%; font-size: 14px; cursor: pointer; }
        
        .viewport-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; padding: 20px; overflow: hidden; }
        #art-canvas { display: none; background: #ffffff; flex-direction: column; align-items: center; box-shadow: 0 40px 80px rgba(0,0,0,0.7); position: relative; transition: all 0.2s ease; }
        #p-img { max-width: 100%; max-height: 65vh; object-fit: contain; }

        /* 应用变量 */
        #out-model { font-family: var(--font-l), sans-serif !important; }
        #out-logo { font-family: var(--font-c), serif !important; }
        #out-params, #out-date { font-family: var(--font-r), monospace !important; }

        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: #333; }
        optgroup { color: #3b82f6; font-style: normal; font-weight: bold; background: #000; }
        
        /* 隐藏输入框上下箭头 */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="h-screen flex">

    <aside class="w-80 h-full sidebar-bg flex flex-col z-30 overflow-y-auto p-5 space-y-5 sidebar">
        <header class="flex flex-col gap-1">
            <h1 class="text-[10px] font-black tracking-[0.3em] uppercase text-blue-500">Curator Studio</h1>
        </header>

        <button id="upload-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded text-[10px] uppercase tracking-widest hover:bg-blue-500 transition-all shadow-lg active:scale-95">导入照片</button>
        <input type="file" id="file-in" class="hidden" accept="image/*">

        <script type="text/template" id="font-options">
            <optgroup label="—— 极简无衬线 ——">
                <option value="Inter" style="font-family: 'Inter', sans-serif;">Inter (默认)</option>
                <option value="Montserrat" style="font-family: 'Montserrat', sans-serif;">Montserrat</option>
                <option value="Syncopate" style="font-family: 'Syncopate', sans-serif;">Syncopate</option>
                <option value="Syne" style="font-family: 'Syne', sans-serif;">Syne</option>
                <option value="Poppins" style="font-family: 'Poppins', sans-serif;">Poppins</option>
            </optgroup>
            <optgroup label="—— 经典与奢侈 ——">
                <option value="Playfair Display" style="font-family: 'Playfair Display', serif;">Playfair (杂志)</option>
                <option value="Cinzel" style="font-family: 'Cinzel', serif;">Cinzel (石刻)</option>
                <option value="Cormorant Garamond" style="font-family: 'Cormorant Garamond', serif;">Garamond</option>
                <option value="Libre Baskerville" style="font-family: 'Libre Baskerville', serif;">Baskerville</option>
                <option value="Great Vibes" style="font-family: 'Great Vibes', cursive;">Great Vibes</option>
            </optgroup>
            <optgroup label="—— 潮流与海报 ——">
                <option value="Bebas Neue" style="font-family: 'Bebas Neue', sans-serif;">Bebas Neue</option>
                <option value="Anton" style="font-family: 'Anton', sans-serif;">Anton</option>
                <option value="Righteous" style="font-family: 'Righteous', sans-serif;">Righteous</option>
                <option value="Staatliches" style="font-family: 'Staatliches', sans-serif;">Staatliches</option>
            </optgroup>
            <optgroup label="—— 艺术与复古 ——">
                <option value="Special Elite" style="font-family: 'Special Elite', cursive;">Typewriter</option>
                <option value="UnifrakturMaguntia" style="font-family: 'UnifrakturMaguntia', serif;">Gothic</option>
                <option value="Kaushan Script" style="font-family: 'Kaushan Script', cursive;">Kaushan</option>
                <option value="Sixtyfour" style="font-family: 'Sixtyfour', sans-serif;">Digital 64</option>
                <option value="Creepster" style="font-family: 'Creepster', cursive;">Creepster</option>
            </optgroup>
            <optgroup label="—— 极客与工业 ——">
                <option value="JetBrains Mono" style="font-family: 'JetBrains Mono', monospace;">JetBrains Mono</option>
                <option value="Orbitron" style="font-family: 'Orbitron', sans-serif;">Orbitron</option>
                <option value="VT323" style="font-family: 'VT323', monospace;">Retro Terminal</option>
            </optgroup>
        </script>

        <div class="space-y-4">
            <div class="bg-white/5 p-3 rounded-lg border border-white/5 space-y-2">
                <label class="text-[8px] text-gray-400 uppercase block">📐 精确留白 (像素)</label>
                <div class="grid grid-cols-2 gap-2 text-[10px] text-gray-300">
                    <label>上: <input type="number" id="pad-t" value="50" class="custom-input !p-1 !text-center"></label>
                    <label>下: <input type="number" id="pad-b" value="50" class="custom-input !p-1 !text-center"></label>
                    <label>左: <input type="number" id="pad-l" value="50" class="custom-input !p-1 !text-center"></label>
                    <label>右: <input type="number" id="pad-r" value="50" class="custom-input !p-1 !text-center"></label>
                </div>
            </div>

            <div class="space-y-3">
                <div class="bg-white/5 p-3 rounded-lg border border-white/5">
                    <label class="text-[8px] text-gray-400 uppercase mb-2 block">📷 相机型号</label>
                    <input type="text" id="i-model" class="custom-input mb-2" placeholder="相机型号">
                    <select id="s-font-left" class="custom-select font-dropdown"></select>
                </div>

                <div class="bg-white/5 p-3 rounded-lg border border-white/5">
                    <label class="text-[8px] text-gray-400 uppercase mb-2 block">🏷️ 品牌标识</label>
                    <input type="text" id="i-logo" class="custom-input mb-2" placeholder="品牌名称">
                    <select id="s-font-center" class="custom-select font-dropdown"></select>
                </div>

                <div class="bg-white/5 p-3 rounded-lg border border-white/5">
                    <label class="text-[8px] text-gray-400 uppercase mb-2 block">⚙️ 曝光参数 & 日期</label>
                    <input type="text" id="i-params" class="custom-input mb-2" placeholder="参数">
                    <input type="text" id="i-date" class="custom-input mb-2" placeholder="日期">
                    <select id="s-font-right" class="custom-select font-dropdown"></select>
                </div>
            </div>

            <div class="flex gap-4">
                <div class="flex-1"><label class="text-[8px] text-gray-400 mb-1 block uppercase">底色</label><input type="color" id="c-bg" value="#ffffff" class="w-full h-8 cursor-pointer rounded"></div>
                <div class="flex-1"><label class="text-[8px] text-gray-400 mb-1 block uppercase">文字</label><input type="color" id="c-txt" value="#1a1a1a" class="w-full h-8 cursor-pointer rounded"></div>
            </div>

            <button id="save-btn" class="hidden w-full bg-white text-black font-bold py-4 rounded text-xs uppercase tracking-widest hover:bg-gray-200 transition-all shadow-xl">专业导出 (4K)</button>
        </div>
    </aside>

    <main class="viewport-container">
        <div id="art-canvas">
            <img id="p-img" src="">
            <div id="f-bar" class="w-full flex justify-between items-end px-10 py-10">
                <div class="flex-1 flex flex-col">
                    <div id="out-model" class="text-3xl font-black tracking-tighter leading-none">---</div>
                </div>
                <div class="flex-1 flex justify-center">
                    <div id="out-logo" class="text-3xl px-4 uppercase">---</div>
                </div>
                <div class="flex-1 flex flex-col items-end text-right">
                    <div id="out-params" class="text-base font-bold tracking-tight uppercase">---</div>
                    <div id="out-date" class="text-[11px] opacity-70 mt-2 font-mono">---</div>
                </div>
            </div>
        </div>
    </main>

    <script>
    $(document).ready(function() {
        // 恢复全量字库预览
        $('.font-dropdown').html($('#font-options').html());
        $('#s-font-left').val('Inter');
        $('#s-font-center').val('Playfair Display');
        $('#s-font-right').val('JetBrains Mono');

        function updatePreview() {
            const root = document.documentElement;
            root.style.setProperty('--font-l', $('#s-font-left').val());
            root.style.setProperty('--font-c', $('#s-font-center').val());
            root.style.setProperty('--font-r', $('#s-font-right').val());

            const txtColor = $('#c-txt').val();
            const bgColor = $('#c-bg').val();
            
            // 应用像素级数字留白
            $('#art-canvas').css({
                'padding-top': $('#pad-t').val() + "px",
                'padding-bottom': $('#pad-b').val() + "px",
                'padding-left': $('#pad-l').val() + "px",
                'padding-right': $('#pad-r').val() + "px",
                'background-color': bgColor
            });

            // 文字色彩与透明度
            const isDark = (parseInt(bgColor.substring(1), 16) < 0xffffff / 2);
            const textOpacity = isDark ? 0.9 : 1;
            $('#f-bar').css({ 'color': txtColor, 'opacity': textOpacity, 'margin-top': '20px' });
            
            $('#out-model').text($('#i-model').val() || "CAMERA");
            $('#out-params').text($('#i-params').val() || "PARAMS");
            $('#out-date').text($('#i-date').val() || "DATE");
            $('#out-logo').text($('#i-logo').val() || "BRAND");
        }

        $('input, select').on('input change', updatePreview);
        $('#upload-btn').click(() => $('#file-in').click());

        $('#file-in').on('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                $('#p-img').attr('src', ev.target.result).on('load', function() {
                    $('#art-canvas').css('display', 'flex');
                    $('#save-btn').removeClass('hidden');

                    EXIF.getData(file, function() {
                        const t = EXIF.getAllTags(this);
                        const model = t.Model || t.Make || "UNKNOWN";
                        $('#i-model').val(model.toUpperCase());
                        
                        const f = t.FNumber ? "f/" + t.FNumber.toFixed(1) : "";
                        const focal = t.FocalLength ? t.FocalLength.valueOf() + "mm" : "";
                        const shutter = t.ExposureTime ? (t.ExposureTime < 1 ? `1/${Math.round(1/t.ExposureTime)}s` : `${t.ExposureTime}s`) : "";
                        const iso = t.ISOSpeedRatings ? "ISO " + t.ISOSpeedRatings : "";
                        
                        $('#i-params').val(`${focal} ${f} ${shutter} ${iso}`.trim());
                        $('#i-logo').val((t.Make || "STUDIO").split(' ')[0].toUpperCase());
                        $('#i-date').val(t.DateTime?.split(' ')[0].replace(/:/g, '.') || "");
                        updatePreview();
                    });
                });
            };
            reader.readAsDataURL(file);
        });

        $('#save-btn').click(function() {
            html2canvas($('#art-canvas')[0], { scale: 4, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.href = canvas.toDataURL("image/png");
                link.download = `Perfect_Gallery_${Date.now()}.png`;
                link.click();
            });
        });
    });
    </script>
</body>

</html>
